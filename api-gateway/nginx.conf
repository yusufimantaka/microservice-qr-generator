worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    # -----------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # -----------------------------------------------------------------
    # Rate-limiting zones
    # -----------------------------------------------------------------
    # Global per-IP: 60 req/min (burst 20)
    limit_req_zone $binary_remote_addr zone=global_ip:10m rate=60r/m;

    # QR generation: tighter limit — 30 req/min per IP (burst 10)
    limit_req_zone $binary_remote_addr zone=qr_generate:10m  rate=30r/m;

    # Auth endpoints: 10 req/min per IP (prevents brute-force at gateway level)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=10r/m;

    # Batch API: 5 req/min per IP
    limit_req_zone $binary_remote_addr zone=batch_limit:10m  rate=5r/m;

    limit_req_status 429;

    # -----------------------------------------------------------------
    # Upstreams
    # -----------------------------------------------------------------
    upstream qr_generator {
        server qr-generator:5000;
        keepalive 32;
    }

    upstream auth_service {
        server auth-service:5001;
        keepalive 16;
    }

    upstream user_history {
        server user-history:5002;
        keepalive 16;
    }

    upstream batch_api {
        server batch-api:5003;
        keepalive 16;
    }

    # -----------------------------------------------------------------
    # Main server
    # -----------------------------------------------------------------
    server {
        listen 8080;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "DENY"    always;
        add_header X-XSS-Protection       "1; mode=block" always;

        client_max_body_size 1m;

        # --- Gateway health -----------------------------------------
        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # --- Auth service -------------------------------------------
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass         http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 10s;
        }

        # --- QR generation ------------------------------------------
        location /api/v1/qr/generate {
            limit_req zone=qr_generate burst=10 nodelay;

            proxy_pass         http://qr_generator/api/v1/generate;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 15s;
        }

        # --- User history -------------------------------------------
        location /api/v1/history {
            limit_req zone=global_ip burst=20 nodelay;

            proxy_pass         http://user_history;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 10s;
        }

        # --- Batch API ----------------------------------------------
        location /api/v1/batch/ {
            limit_req zone=batch_limit burst=3 nodelay;

            proxy_pass         http://batch_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 30s;
        }

        # --- Rate-limit response ------------------------------------
        error_page 429 = @too_many_requests;
        location @too_many_requests {
            add_header Content-Type application/json always;
            return 429 '{"error":"too many requests","retry_after":"60"}';
        }

        # --- Catch-all 404 ------------------------------------------
        location / {
            return 404 '{"error":"not found"}';
            add_header Content-Type application/json always;
        }
    }
}
